name: Tests (E2E)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "poetry.lock"
      - "pyproject.toml"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "poetry.lock"
      - "pyproject.toml"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.12
  IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name }}

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4.2.0
        with:
          path: .venv
          key: pydeps-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies using poetry
        run: poetry install --no-interaction --no-root --with dev

      - name: Run unit tests and report coverage
        run: |
          poetry run coverage run --omit="*/test*" --branch -m pytest --timeout 60 -v tests/

      - name: Convert coverage results to JSON
        run: poetry run coverage json --omit="src/providers/*"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          files: coverage.json
          verbose: true

  build-backend:
    needs: run-tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'dev'
    outputs:
      image_name: ${{ steps.set-image-name.outputs.image_name }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set lowercase repository owner
        id: repo-owner
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${REPO_OWNER_LOWER}" >> $GITHUB_OUTPUT

      - name: Extract version from pyproject.toml
        id: get-version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set image name
        id: set-image-name
        run: |
          if [[ "${{ env.IS_FORK }}" == "true" ]]; then
            echo "image_name=keep-workflows:local" >> $GITHUB_OUTPUT
          else
            echo "image_name=ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: ${{ env.IS_FORK != 'true' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Set cache key variables
        id: cache-keys
        run: |
          SAFE_BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9._-]//g')
          echo "SAFE_BRANCH_NAME=${SAFE_BRANCH}" >> $GITHUB_OUTPUT

          DEPS_HASH=$(cat poetry.lock pyproject.toml | sha256sum | cut -d ' ' -f 1)
          echo "DEPS_HASH=${DEPS_HASH:0:8}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        if: ${{ env.IS_FORK != 'true' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:${{ github.sha }}
            ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:${{ steps.get-version.outputs.version }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:cache-${{ steps.cache-keys.outputs.DEPS_HASH }}
            type=registry,ref=ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:cache-${{ steps.cache-keys.outputs.SAFE_BRANCH_NAME }}
          cache-to: |
            type=registry,ref=ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:cache-${{ steps.cache-keys.outputs.DEPS_HASH }},mode=max
            type=registry,ref=ghcr.io/${{ steps.repo-owner.outputs.owner }}/keep-workflows:cache-${{ steps.cache-keys.outputs.SAFE_BRANCH_NAME }},mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
